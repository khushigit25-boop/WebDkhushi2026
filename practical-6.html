<!DocType html>
<html>
    <head>
        <title>Scholership / Seminar Registration Form</title>
    </head>
    <body>
        <h2>Scholership / Seminar Registration Form</h2>
        <form>
            <!-- Personal Information -->
             <fieldset>
                <legand>Personal Information</legand>
                <label>Full Name:</label>
                <input type="text" name="fullname"><br></br>
                <label>Email:</label>
                <input type="email" name="phone"><br><br>
                <label>Phone Number:</label>
                <input type="tel" name="phone"><br><br>
                <label>Gender:</label>
                <input type="radio" name="gender" value="male">male
                <input type="radio" name="gender" value="female">female
                <input type="radio" name="gender" value="other">other
             </fieldset>
             <br>
             <!-- Academic Information -->
              <fieldset>
                <legand>Academic Details</legand>
                <label>Course:</label>
                <select name="course">
                    <option value="">--select course--</option>
                    <option value="btech">B.Tech</option>
                    <option value="bsc">B.Sc</option>
                    <option value="bca">BCA</option>
                    <option value="mca">MCA</option>
                    <option value="msc">M.Sc</option>
                </select>
                <br><br>
                <label>Year of Study:</label>
                <select name="year">
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
              </fieldset>
              <br>
              <!-- Seminar Preferences -->
               <fieldset>
                <legand>Seminar Topics Interested In</legand>
                <input type="checkbox" name="topic" value="ai">Artificial Intelligence<br>
                <input type="checkbox" name="topic" value="web"> Web Development<br>
                <input type="checkbox" name="topic" value="cyber"> Cyber Security<br>
                <input type="checkbox" name="topic" value="data"> Data Science
            </fieldset>
            <br>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">
        </form>
    </body>
</html>
